name: Sincronização Diária do Catálogo

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync_catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checa o repositório
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Executa processamento em lotes do JS
        run: |
          npm install
          node scripts/sync.js

      - name: Commit e Push do catalog.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          git diff --staged --quiet || git commit -m "chore: atualizacao diaria em lotes do catalogo"
          git push
